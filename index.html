        let map, markersCluster;

        function initMap() {
            try {
                map = L.map('map', { attributionControl: false }).setView(DEFAULT_CENTER, DEFAULT_ZOOM);

                L.tileLayer(
                    `https://tiles.api-maps.yandex.ru/v1/tiles/?apikey=${YANDEX_API_KEY}&lang=ru_RU&l=map&x={x}&y={y}&z={z}`,
                    { maxZoom: 19, attribution: '<a href="https://yandex.ru/legal/maps_api/" target="_blank">Условия Яндекс Карт</a>' }
                ).addTo(map);

                markersCluster = L.markerClusterGroup({
                    maxClusterRadius: 50,
                    spiderfyOnMaxZoom: true,
                    showCoverageOnHover: false,
                    iconCreateFunction: function(cluster) {
                        const count = cluster.getChildCount();
                        const size = count > 30 ? 44 : count > 15 ? 40 : 36;
                        const fs = count > 30 ? 15 : count > 15 ? 14 : 13;
                        return L.divIcon({
                            html: `<div style="background:#e94560;color:#fff;width:${size}px;height:${size}px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-weight:700;font-size:${fs}px;border:3px solid #fff;">${count}</div>`,
                            className: '', iconSize: [size, size], iconAnchor: [size/2, size/2]
                        });
                    }
                });

                services.forEach(service => {
                    const icon = L.divIcon({
                        html: '<div style="background:#e94560;width:16px;height:16px;border-radius:50%;border:2px solid #fff;box-shadow:0 2px 6px rgba(0,0,0,0.3);"></div>',
                        iconSize: [16, 16], iconAnchor: [8, 8], className: ''
                    });

                    const servicesTags = service.services_list
                        ? service.services_list.split(', ').map(s => `<span>${s.trim()}</span>`).join('')
                        : '';

                    const popupContent = `
                        <div class="custom-popup" style="min-width:240px;">
                            <div class="popup-name">${service.name}</div>
                            <div class="popup-address">📍 ${service.address}</div>
                            ${service.phone ? `<div class="popup-phone"><a href="tel:${service.phone.replace(/[\s\-\(\)]/g,'')}">📞 ${service.phone}</a></div>` : ''}
                            ${servicesTags ? `<div class="popup-services">${servicesTags}</div>` : ''}
                            <div class="popup-links">
                                ${service.vk ? `<a href="${service.vk}" target="_blank" rel="noopener" class="popup-link popup-link-vk">💬 Обсудить в ВК</a>` : ''}
                                ${service.website ? `<a href="${service.website}" target="_blank" rel="noopener" class="popup-link popup-link-web">🌐 Сайт</a>` : ''}
                            </div>
                        </div>
                    `;

                    const marker = L.marker([service.lat, service.lon], { icon })
                        .bindPopup(popupContent, { maxWidth: 320, className: 'custom-popup' });
                    markersCluster.addLayer(marker);
                });

                map.addLayer(markersCluster);

                // Геолокация — показываем метку, но НЕ смещаем центр карты
                if (navigator.geolocation) {
                    navigator.geolocation.getCurrentPosition(
                        pos => {
                            const userIcon = L.divIcon({
                                html: '<div style="background:#4CAF50;width:16px;height:16px;border-radius:50%;border:3px solid #fff;box-shadow:0 0 12px rgba(76,175,80,0.6);"></div>',
                                iconSize: [16, 16], iconAnchor: [8, 8], className: ''
                            });
                            L.marker([pos.coords.latitude, pos.coords.longitude], { icon: userIcon })
                                .bindPopup('📍 Вы здесь')
                                .addTo(map);
                            // Центр карты не меняем — остаёмся в Нижнем Новгороде
                        },
                        () => {},
                        { timeout: 5000 }
                    );
                }

                document.getElementById('serviceCount').textContent = services.length;
            } catch (error) {
                console.error('Ошибка загрузки карты:', error);
                document.getElementById('map').innerHTML = '<div style="text-align:center;padding:40px;color:#999;">Не удалось загрузить карту.<br>Проверьте подключение к интернету.</div>';
            }
        }

        document.addEventListener('DOMContentLoaded', () => {
            initMap();
            console.log('🚗 ГдеСервис — Нижний Новгород');
            console.log(`📌 ${services.length} автосервисов на карте (данные OSM)`);
        });
    </script>
