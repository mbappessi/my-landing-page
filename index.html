    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: system-ui, sans-serif;
            background: linear-gradient(135deg, #0f0c29, #302b63, #24243e);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            color: #fff;
            text-align: center;
            padding: 20px;
            position: relative;
        }
        .container {
            display: flex;
            flex-direction: column;
            align-items: center;
            max-width: 600px;
        }
        .logo { font-size: 64px; font-weight: 700; margin-bottom: 16px; }
        .logo span { color: #e94560; }
        .sub { font-size: 18px; color: #aaa; margin-bottom: 30px; }
        .btn {
            display: inline-block;
            padding: 14px 40px;
            background: #e94560;
            color: #fff;
            border-radius: 30px;
            text-decoration: none;
            font-weight: 600;
            transition: 0.3s;
        }
        .btn:hover { background: #c7364f; }
        .links {
            display: flex;
            gap: 20px;
            margin-top: 30px;
            flex-wrap: wrap;
            justify-content: center;
        }
        .links a {
            color: #888;
            text-decoration: none;
            font-size: 14px;
            transition: 0.2s;
        }
        .links a:hover { color: #fff; }
        .footer { margin-top: 40px; font-size: 14px; color: #333; }

        .cookie-notice {
            position: fixed;
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(26, 26, 46, 0.95);
            backdrop-filter: blur(8px);
            border: 1px solid rgba(233, 69, 96, 0.3);
            padding: 12px 24px;
            border-radius: 16px;
            font-size: 13px;
            color: #ccc;
            z-index: 9999;
            max-width: 90%;
            box-shadow: 0 8px 32px rgba(0,0,0,0.4);
            display: flex;
            align-items: center;
            gap: 12px;
            flex-wrap: wrap;
            justify-content: center;
            text-align: center;
            opacity: 0;
            transform: translateX(-50%) translateY(20px);
            transition: opacity 0.5s ease, transform 0.5s ease;
            pointer-events: none;
        }
        .cookie-notice.show {
            opacity: 1;
            transform: translateX(-50%) translateY(0);
            pointer-events: auto;
        }
        .cookie-notice a {
            color: #e94560;
            text-decoration: underline;
            white-space: nowrap;
        }
        .cookie-notice .close-btn {
            background: none;
            border: none;
            color: #666;
            font-size: 20px;
            cursor: pointer;
            padding: 0 4px;
            line-height: 1;
            transition: 0.2s;
            flex-shrink: 0;
        }
        .cookie-notice .close-btn:hover { color: #fff; }

        @media (max-width: 480px) {
            .cookie-notice {
                bottom: 16px;
                padding: 10px 16px;
                font-size: 12px;
                width: 95%;
            }
            .cookie-notice a { white-space: normal; }
        }
    </style>

<body>

    <div class="container">
        <div class="logo">Где<span>Сервис</span></div>

            Сайт в разработке.

        <div class="links">
            <a href="/privacy.html">Политика конфиденциальности</a>
            <a href="/agreement.html">Пользовательское соглашение</a>
        </div>
        <div class="footer">© 2026 ГдеСервис</div>
    </div>

    <!-- ===== УВЕДОМЛЕНИЕ ===== -->
    <div class="cookie-notice" id="cookieNotice">
        <span>
            🍪 Мы используем файлы cookie и Яндекс Метрику для сбора статистики.
            Подробнее в <a href="/privacy.html">Политике конфиденциальности</a>.
        </span>
        <button class="close-btn" onclick="closeNotice()">✕</button>
    </div>

    <script>
        // ===== УВЕДОМЛЕНИЕ =====
        const notice = document.getElementById('cookieNotice');

        function closeNotice() {
            notice.classList.remove('show');
            localStorage.setItem('cookiesAccepted', 'true');
        }

        if (!localStorage.getItem('cookiesAccepted')) {
            setTimeout(() => notice.classList.add('show'), 1000);
        }
    </script>

</body>
