<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ГдеСервис</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: system-ui, sans-serif;
            background: linear-gradient(135deg, #0f0c29, #302b63, #24243e);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            color: #fff;
            text-align: center;
            padding: 20px;
        }
        .container {
            display: flex;
            flex-direction: column;
            align-items: center;
        }
        .logo { font-size: 64px; font-weight: 700; margin-bottom: 16px; }
        .logo span { color: #e94560; }
        .sub { font-size: 18px; color: #aaa; margin-bottom: 30px; }
        .btn {
            display: inline-block;
            padding: 14px 40px;
            background: #e94560;
            color: #fff;
            border-radius: 30px;
            text-decoration: none;
            font-weight: 600;
            transition: 0.3s;
        }
        .btn:hover { background: #c7364f; }
        .links { display: flex; gap: 20px; margin-top: 30px; flex-wrap: wrap; justify-content: center; }
        .links a { color: #555; text-decoration: none; font-size: 14px; }
        .links a:hover { color: #aaa; }
        .footer { margin-top: 40px; font-size: 14px; color: #333; }
    </style>
</head>
<body>
    <div class="container">
        <div class="logo">Где<span>Сервис</span></div>
        <div class="sub">
            Поиск и выбор автосервисов по отзывам.<br>
            Сайт в разработке.
        </div>
        <a href="https://vk.com/gdeservic" class="btn" target="_blank">Сообщество Вконтакте</a>
        <div class="links">
        </div>
        <div class="footer">© 2026 ГдеСервис</div>
    </div>
</body>
</html>
